name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install django
        # If any subfolder contains a requirements.txt file, install it
        find . -name "requirements.txt" -exec pip install -r {} \;

    - name: Run Tests Across Multiple Projects
      run: |
        # Search for every folder containing a manage.py file and run its tests
        find . -name "manage.py" | while read -r file; do
          PROJECT_DIR=$(dirname "$file")
          echo "=================================================="
          echo "Processing Django Project inside: $PROJECT_DIR"
          echo "=================================================="
          cd "$PROJECT_DIR"
          python manage.py test || exit 1
          cd - > /dev/null
        done
