name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # This will search for requirements.txt in your subprojects automatically
          find . -name "requirements.txt" -exec pip install -r {} \;

      - name: Run Tests
        run: |
          # This dynamically finds where your manage.py is and runs the tests inside that folder
          MANAGED_DIR=$(dirname $(find . -name "manage.py" -print -quit))
          cd $MANAGED_DIR
          python manage.py test
